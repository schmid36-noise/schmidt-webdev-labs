<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <!-- Start with the code from the HTML folder.
      - Make sure to fix any issues in your HTML code.
      - Delete all mentions of <br>s and style the line breaks with CSS. 
      - Add classes to style the elements on the page. -->

      <form method="post" action="/calculator"></form>
      <h1>Roth IRA Calculator</h1>
      <div>
        <label for="balance">Balance ($)</label>
        <input type="text" id="balance" name="balance" />
      </div>
      <div>
        <label for="contribution">Annual contribution (4)</label>
        <input type="text" id="contribution" name="contribuition" />
      </div>
      <fieldset class="fieldset">
        <legend>Maximize contributions?</legend>
        <input type="radio" id="yes" name="contribuition_select" value="Yes" />
        <label for="yes">Yes</label>
        <input type="radio" id="no" name="contribuition_select" value="No" />
        <label for="no">No</label>
      </fieldset>
      <div>
        <label for="return">Expected rate of return (5)</label>
        <input type="number" id="return_rate" name="return_rate" />
      </div>
      <div>
        <label for="current_age">Current age</label>
        <input type="number" id="current_age" name="current_age" />
      </div>
      <div>
        <label for="retirement_age">Retirement age</label>
        <input type="number" id="retirement_age" name="retirement_age" />
      </div>
      <div>
        <label for="tax_rate">Marginal tax rate (%)</label>
        <input type="number" id="tax_rate" name="tax_rate" />
      </div>
      <div>
        <input type="submit" value="Calculate" />
        <input type="reset" value="Reset" />
      </div>
      <p>
        This exercise is a simplified version of the Roth IRA Calculator at
        <a href="https://www.calculator.net/roth-ira-calculator.html"
          >Calculator.net</a
        >
      </p>
    </main>
  </body>
</html>
